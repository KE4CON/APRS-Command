name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            rid: osx-arm64
            artifact: APRSCommand-${{ github.ref_name }}-macos-arm64

          - name: macOS (Intel)
            os: macos-latest
            rid: osx-x64
            artifact: APRSCommand-${{ github.ref_name }}-macos-x64

          - name: Windows (x64)
            os: windows-latest
            rid: win-x64
            artifact: APRSCommand-${{ github.ref_name }}-windows-x64

          - name: Linux / Raspberry Pi (ARM64)
            os: ubuntu-latest
            rid: linux-arm64
            artifact: APRSCommand-${{ github.ref_name }}-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/Aprs.Desktop/Aprs.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          -o publish/${{ matrix.rid }}

      - name: Zip (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          cd publish
          zip -r ../${{ matrix.artifact }}.zip ${{ matrix.rid }}/

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: APRS Command ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## APRS Command ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon M1/M2/M3) | `APRSCommand-${{ github.ref_name }}-macos-arm64.zip` |
            | macOS (Intel) | `APRSCommand-${{ github.ref_name }}-macos-x64.zip` |
            | Windows 10/11 (64-bit) | `APRSCommand-${{ github.ref_name }}-windows-x64.zip` |
            | Linux / Raspberry Pi (ARM64) | `APRSCommand-${{ github.ref_name }}-linux-arm64.zip` |

            ### Installation

            1. Download the zip for your platform
            2. Unzip to a folder of your choice
            3. Run `Aprs.Desktop` (macOS/Linux) or `Aprs.Desktop.exe` (Windows)

            **macOS:** If Gatekeeper warns you, right-click the app and choose Open.
            **Windows:** If SmartScreen warns you, click "More info" then "Run anyway".

            ### What's new

            See [RELEASE_NOTES](docs/RELEASE_NOTES_TEMPLATE.md) for changes in this release.

            ---
            Copyright © 2026 James Rospopo (KE4CON) — Released under GPL v3
          files: artifacts/**/*.zip
