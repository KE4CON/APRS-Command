name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Portable zip archives ──────────────────────────────────────────────────
  build:
    name: Build portable (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            rid: osx-arm64
            artifact: APRSCommand-${{ github.ref_name }}-macos-arm64
          - name: macOS (Intel)
            os: macos-latest
            rid: osx-x64
            artifact: APRSCommand-${{ github.ref_name }}-macos-x64
          - name: Windows (x64)
            os: windows-latest
            rid: win-x64
            artifact: APRSCommand-${{ github.ref_name }}-windows-x64
          - name: Linux ARM64
            os: ubuntu-latest
            rid: linux-arm64
            artifact: APRSCommand-${{ github.ref_name }}-linux-arm64
          - name: Linux x64
            os: ubuntu-latest
            rid: linux-x64
            artifact: APRSCommand-${{ github.ref_name }}-linux-x64

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/Aprs.Desktop/Aprs.Desktop.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:PublishSingleFile=false
          -o publish/${{ matrix.rid }}

      - name: Zip (macOS / Linux)
        if: runner.os != 'Windows'
        run: cd publish && zip -r ../${{ matrix.artifact }}.zip ${{ matrix.rid }}/

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ── macOS .dmg installers ─────────────────────────────────────────────────
  installer-macos:
    name: macOS DMG (${{ matrix.rid }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            artifact: APRSCommand-${{ github.ref_name }}-macos-arm64-installer
          - rid: osx-x64
            artifact: APRSCommand-${{ github.ref_name }}-macos-x64-installer
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Build DMG
        run: bash scripts/make-macos-app.sh ${{ matrix.rid }}
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/installers/APRSCommand-${{ matrix.rid }}.dmg

  # ── Windows NSIS installer ────────────────────────────────────────────────
  installer-windows:
    name: Windows NSIS installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install NSIS
        run: choco install nsis --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          pwsh scripts/make-windows-installer.ps1 -Version $v
      - uses: actions/upload-artifact@v5
        with:
          name: APRSCommand-${{ github.ref_name }}-windows-x64-installer
          path: artifacts/installers/APRSCommand-windows-x64-Setup.exe

  # ── Linux .deb / .rpm packages ────────────────────────────────────────────
  installer-linux:
    name: Linux packages (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            artifact: APRSCommand-${{ github.ref_name }}-linux-x64-packages
          - rid: linux-arm64
            artifact: APRSCommand-${{ github.ref_name }}-linux-arm64-packages
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y dpkg-dev rpm
          # ARM64 cross-compilation support
          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            sudo apt-get install -y qemu-user-static binfmt-support
            sudo dpkg --add-architecture arm64
          fi
      - name: Build .deb and .rpm
        run: |
          v="${{ github.ref_name }}"
          bash scripts/make-linux-packages.sh ${{ matrix.rid }} "${v#v}"
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/installers/

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, installer-macos, installer-windows, installer-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: APRS Command ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## APRS Command ${{ github.ref_name }}

            ### Installers (recommended)

            | Platform | File | Notes |
            |---|---|---|
            | macOS Apple Silicon (M1/M2/M3/M4) | `APRSCommand-${{ github.ref_name }}-macos-arm64.dmg` | Right-click → Open on first launch |
            | macOS Intel | `APRSCommand-${{ github.ref_name }}-macos-x64.dmg` | Right-click → Open on first launch |
            | Windows 10/11 (64-bit) | `APRSCommand-${{ github.ref_name }}-windows-x64-Setup.exe` | Click "More info" → "Run anyway" |
            | Linux x64 | `aprs-command_${{ github.ref_name }}_amd64.deb` | `sudo dpkg -i` |
            | Linux ARM64 / Raspberry Pi | `aprs-command_${{ github.ref_name }}_arm64.deb` | `sudo dpkg -i` |

            ### Portable archives

            | Platform | File |
            |---|---|
            | macOS Apple Silicon | `APRSCommand-${{ github.ref_name }}-macos-arm64.zip` |
            | macOS Intel | `APRSCommand-${{ github.ref_name }}-macos-x64.zip` |
            | Windows 10/11 | `APRSCommand-${{ github.ref_name }}-windows-x64.zip` |
            | Linux ARM64 / Raspberry Pi | `APRSCommand-${{ github.ref_name }}-linux-arm64.zip` |
            | Linux x64 | `APRSCommand-${{ github.ref_name }}-linux-x64.zip` |

            ### Security notice

            APRS Command is open-source (GPL v3). We do not purchase annual
            code-signing certificates ($300–500/yr) for open-source software.

            **macOS:** Right-click the .app → Open → Open. One time only.
            **Windows:** Click "More info" → "Run anyway". One time only.

            See [INSTALLATION_GUIDE.md](docs/INSTALLATION_GUIDE.md) for full instructions.

            ---
            Copyright © 2026 KE4CON — GPL v3 — github.com/KE4CON/APRS-Command
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
