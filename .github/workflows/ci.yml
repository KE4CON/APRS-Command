name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore CrossPlatformAprs.sln

      - name: Build
        run: dotnet build CrossPlatformAprs.sln -c Release --no-restore -v minimal

      - name: Test
        run: dotnet test tests/Aprs.Tests/Aprs.Tests.csproj -c Release --no-build -v minimal
